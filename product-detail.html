<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/main.css">
    <title>The Tea Warehouse</title>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&display=swap');
    </style>
</head>

<body>
    <div class="page product-page">
    
        <!-- top nav -->
        <header class="header">
            <!-- logo goes to homepage -->
            <a href="index.html" class="logo">
                <img src="images/TWHlogo.png" alt="tea warehouse logo">
            </a>

            <nav class="nav-icons" aria-label="top nav">
                <button onclick="openSearch()" class="nav-icon-link" aria-label="search">
                    <img src="images/search-icon.png" alt="search">
                </button>
                <a href="cart.html" class="nav-icon-link cart-icon">
                     <img src="images/cart.png" alt="cart">
                     <span id="cart-count">0</span>
                </a>
                <button aria-label="menu">
                    <img src="images/menu-icon.png" alt="menu">
                </button>
            </nav>
        </header>

        <main class="product-main">
        <!-- ORGANIC JASMINE GREEN TEA -->
            <!-- back -->
             <a href="results.html" class="back-link">&lt; Back</a>

            <!-- title  -->
            <section class="product-title-card">
                <h1 id="product-title">Organic Jasmine Green Tea</h1>
                <p id="product-price"> AUD $15.00 </p> 
            </section>

            <!-- product images -->
            <section class="product-gallery">
                <img 
                    id="main-product-img"
                    src="images/jasminegreen.jpg" 
                    alt="Organic Jasmine Green Tea" 
                    class="product-main-img">
                <div class="thumbnail-row">
                    <img id="thumb-1" src="images/jasminegreen.jpg" alt="">
                    <img src="images/jasminetn.jpg" alt="">
                </div>
            </section>
            
            <!-- dropdown info -->
            <section class="product-dropdown">
                <div class="dropdown-item">
                    <button class="dropdown-btn">
                        Product description
                        <img src="images/arrow-down.png" alt="" class="dropdown-arrow">
                    </button>
                
                    <div class="dropdown-content">
                        <p id="product-description"></p>
                    </div>
                </div>

                <div class="dropdown-item">
                    <button class="dropdown-btn">
                        Reviews
                        <img src="images/arrow-down.png" alt="" class="dropdown-arrow">
                    </button>

                    <div class="dropdown-content">
                        <p id="reviews">No reviews yet.</p>
                    </div>
                </div>
                
            </section>

            <!-- add to cart -->
            <button id="addtocart-btn">ADD TO CART</button>

            <!-- recommendation section -->
            <section class="rec-section">
                <h2 class="rec-heading">You may also like:</h2>
                <div class="product-grid">
                
                <!-- japanese lime green tea -->
                <article class="product-card">
                    <a href="product-detail.html?product=lime">
                        <div class="product-img-container">
                            <img src="images/jplime.jpg" alt="Japanese Lime Green Tea">
                            <button class="quick-add" data-product="lime">
                                <img src="images/add.png" alt="quick add button">
                            </button>
                        </div>
                        <h2>Japanese Lime Green Tea</h2>
                        <p class="price">AUD $20.00</p>
                    </a>
                </article>

                <!-- japanese sencha green tea -->
                <article class="product-card">
                    <a href="product-detail.html?product=sencha">
                        <div class="product-img-container">
                            <img src="images/jpsencha.png" alt="Japanese Sencha Green Tea">
                            <button class="quick-add" data-product="sencha">
                                <img src="images/add.png" alt="quick add button">
                            </button>
                        </div>
                        <h2>Japanese Sencha Green Tea</h2>
                        <p class="price">AUD $20.00</p>
                    </a>
                </article>


        </main>
    </div>

    <!-- search overlay -->
    <div class="search-overlay">
        <div class="search-main">
            <div class="search-bar">
                <img src="images/search-icon.png" alt="search">
                <input 
                    type="text"
                    id="search-input"
                    placeholder="Search for products..."
                >
                <button id="search-btn"></button>
            </div>
        </div>
    </div>

    <script src="scripts/script.js"></script>
</body>
</html>
