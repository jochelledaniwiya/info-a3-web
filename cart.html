<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>The Tea Warehouse</title>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&display=swap');
    </style>
</head>

<body>
    <div class="page cart-page">
    
        <!-- top nav -->
        <header class="header">
            <a href="index.html" class="logo">
                <img src="images/TWHlogo.png" alt="tea warehouse logo">
            </a>

            <nav class="nav-icons" aria-label="top nav">
                <button aria-label="search">
                    <img src="images/search-icon.png" alt="search">
                </button>
                <button aria-label="cart">
                    <img src="images/cart.png" alt="cart">
                </button>
                <button aria-label="menu">
                    <img src="images/menu-icon.png" alt="menu">
                </button>
            </nav>
        </header>

        <!-- heading -->
        <main class="cart-main">

            <a href="product-detail.html" class="back-link"> Back</a>
            
            <h1 class="cart-title">SHOPPING CART</h1>
        
            <!-- product list -->
             <section class="cart-list">

                <!-- Organic jasmine green tea -->
                <article class="cart-card">
                    <div class="cart-img-container">
                        <img src="images/jasminegreen.jpg" alt="Organic jasmine Green Tea">
                        <!-- quantity button -->
                        <div class="quantity-control">
                            <button>-</button>
                            <span>1</span>
                            <button>+</button>
                        </div>
                    </div>
                    <!-- product info -->
                    <div class="cart-text">
                        <h2>Organic Jasmine Green Tea</h2>
                        <p class="price">AUD $15.00</p>
                    </div>
                    <button class="removebtn">
                            <img src="images/removebtn.png" alt="remove btn">
                    </button>

                </article>

             </section>

             <!-- cart total -->
              <div class="cart-total">
                <span>TOTAL:</span>
                <span>AUD $15.00</span>
              </div>

              <!-- add to cart -->
            <button class="checkout-btn">CHECKOUT</button>

            <!-- recommendation section -->
            <section class="rec-section">
                <h2 class="rec-heading">You may also like:</h2>
                <div class="product-grid">
                
                    <!-- jp lime -->
                    <article class="product-card">
                        <div class="product-img-container">
                            <img src="images/jplime.jpg" alt="Japanese Lime Green Tea">
                            <button class="quick-add">
                                <img src="images/add.png" alt="quick add button">
                            </button>
                        </div>
                        <h2>Japanese Lime Green Tea</h2>
                        <p class="price">AUD $20.00</p>
                    </article>

                <!-- jp sencha -->
                    <article class="product-card">
                        <div class="product-img-container">
                            <img src="images/jpsencha.png" alt="Japanese sencha Green Tea">
                            <button class="quick-add">
                                <img src="images/add.png" alt="quick add button">
                            </button>
                        </div>
                        <h2>Japanese Sencha Green Tea</h2>
                        <p class="price">AUD $20.00</p>
                    </article>
                </div>
            </section>
        </main>
