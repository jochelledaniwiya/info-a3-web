<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/main.css">
    <title>The Tea Warehouse</title>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&display=swap');
    </style>
</head>

<body>
    <div class="page results-page">
    
        <!-- top nav -->
        <header class="header">
            <!-- logo goes to homepage -->
            <a href="index.html" class="logo">
                <img src="images/TWHlogo.png" alt="tea warehouse logo">
            </a>

            <nav class="nav-icons" aria-label="top nav">
                <a href="search.html" class="nav-icon-link" aria-label="search">
                    <img src="images/search-icon.png" alt="search">
                </a>
                <a href="cart.html" class="nav-icon-link">
                     <img src="images/cart.png" alt="cart">
                </a>
                <button aria-label="menu">
                    <img src="images/menu-icon.png" alt="menu">
                </button>
            </nav>
        </header>

        <main class="results-main">
            
            <section class="results-heading">
                <div>
                    <h1>RESULTS</h1>
                    <p class="items-count">7 items</p>
                </div>
                <a href="#" class="show-all">Show All</a>
            </section>

            <!-- filter bar -->
            <section class="filter-bar">
                <button>Filter <span>+</span></button>
                <button>
                    Sort by
                    <img src="images/arrow-down.png" alt="">
                </button>
            </section>

            <!-- product list -->
            <section class="product-grid">

                <!-- japanese sencha green tea -->
                <article class="product-card">
                    <a href="product.html?product=sencha">
                        <div class="product-img-container">
                            <img src="images/jpsencha.png" alt="Japanese Sencha Green Tea">
                            <button class="quick-add">
                                <img src="images/add.png" alt="quick add button">
                            </button>
                        </div>
                        <h2>Japanese Sencha Green Tea</h2>
                        <p class="price">AUD $20.00</p>
                    </a>
                </article>

                <!-- japanese bancha green tea -->
                <article class="product-card">
                    <a href="product.html?product=bancha">
                        <div class="product-img-container">
                            <img src="images/jpbancha.jpg" alt="Japanese Bancha Green Tea">
                            <button class="quick-add">
                                <img src="images/add.png" alt="quick add button">
                            </button>
                        </div>
                        <h2>Japanese Bancha Green Tea</h2>
                        <p class="price">AUD $20.00</p>
                    </a>
                </article>

                <!-- japanese lime green tea -->
                <article class="product-card">
                    <a href="product.html?product=lime">
                        <div class="product-img-container">
                            <img src="images/jplime.jpg" alt="Japanese Lime Green Tea">
                            <button class="quick-add">
                                <img src="images/add.png" alt="quick add button">
                            </button>
                        </div>
                        <h2>Japanese Lime Green Tea</h2>
                        <p class="price">AUD $20.00</p>
                    </a>
                </article>

                <!-- Organic jasmine green tea -->
                <article class="product-card">
                    <a href="product.html?product=jasmine">
                        <div class="product-img-container">
                            <img src="images/jasminegreen.jpg" alt="Organic jasmine Green Tea">
                            <button class="quick-add">
                                <img src="images/add.png" alt="quick add button">
                            </button>
                        </div>
                        <h2>Organic Jasmine Green Tea</h2>
                        <p class="price">AUD $15.00</p>
                    </a>
                </article>

                <!-- darjeeling -->
                <article class="product-card">
                    <a href="product.html?product=darjeeling">
                        <div class="product-img-container">
                            <img src="images/darjeeling.jpg" alt="darjeeling">
                            <button class="quick-add">
                                <img src="images/add.png" alt="quick add button">
                            </button>
                        </div>
                        <h2>Darjeeling</h2>
                        <p class="price">AUD $20.00</p>
                    </a>
                </article>

                <!-- balance -->
                <article class="product-card">
                    <a href="product.html?product=balance">
                        <div class="product-img-container">
                            <img src="images/balance.jpg" alt="balance">
                            <button class="quick-add">
                                <img src="images/add.png" alt="quick add button">
                            </button>
                        </div>
                        <h2>Balance</h2>
                        <p class="price">AUD $15.00</p>
                    </a>
                </article>

                <!-- sweet dreams -->
                <article class="product-card">
                    <a href="product.html?product=dreams">
                        <div class="product-img-container">
                            <img src="images/sweetdreams.jpg" alt="sweet dreams">
                            <button class="quick-add">
                                <img src="images/add.png" alt="quick add button">
                            </button>
                        </div>
                        <h2>Sweet Dreams</h2>
                        <p class="price">AUD $15.00</p>
                    </a>
                </article>

            </section>


        </main>
    </div>
</body>
</html>
