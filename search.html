<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>The Tea Warehouse</title>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&display=swap');
    </style>
</head>

<body class="search-page">
    <div class="page">
    
        <!-- top nav -->
        <header class="header">
            <!-- logo goes to homepage -->
            <a href="index.html" class="logo">
                <img src="images/TWHlogo.png" alt="tea warehouse logo">
            </a>

            <nav class="nav-icons" aria-label="top nav">
                <a href="search.html" class="nav-icon-link" aria-label="search">
                    <img src="images/search-icon.png" alt="search">
                </a>
                <a href="cart.html" class="nav-icon-link">
                     <img src="images/cart.png" alt="cart">
                </a>
                <button aria-label="menu">
                    <img src="images/menu-icon.png" alt="menu">
                </button>
            </nav>
        </header>

        <!-- search -->
         <main class="search-main">
            <a href="results.html" class="search-bar">
                <img src="images/popupsearch-icon.png" alt="search">
                <span>Search for products...</span>
            </a>
         </main>
    </div>
</body>
</html>
